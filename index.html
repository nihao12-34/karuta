  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(135deg, #fef9e7 0%, #f5e6c8 100%);
      color: #2c1810;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #5c3d2e;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      color: #7d5a4a;
      margin-bottom: 1.5rem;
    }

    /* スタート画面 */
    .start-screen {
      text-align: center;
      padding: 2rem 1rem;
    }
    .start-screen p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .btn-big {
      display: inline-block;
      padding: 1rem 3rem;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: bold;
      background: #8b4513;
      color: #fff;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(139,69,19,.35);
    }
    .btn-big:hover, .btn-big:focus {
      background: #a0522d;
      transform: scale(1.02);
    }
    .btn-big:active { transform: scale(0.98); }

    /* 読み札エリア */
    .yomifuda-area {
      background: #fff;
      border: 4px solid #8b4513;
      border-radius: 20px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .yomifuda-label {
      font-size: 1rem;
      color: #7d5a4a;
      margin: 0 0 0.5rem 0;
    }
    .yomifuda-text {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: bold;
      line-height: 1.6;
      color: #2c1810;
    }

    .prompt-text {
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      color: #5c3d2e;
      margin: 1rem 0 0.5rem 0;
      font-weight: bold;
    }
    .voice-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 1rem 0;
    }
    .btn-mic {
      padding: 1rem 2rem;
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      font-weight: bold;
      background: #2d5a27;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(45,90,39,.3);
    }
    .btn-mic:hover { background: #3d6b35; }
    .btn-mic:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-mic.listening { background: #8b3a3a; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.85; } }
    .mic-status {
      font-size: 1rem;
      color: #5c3d2e;
    }
    .hint-row {
      margin: 1.25rem 0 0.5rem 0;
    }
    .btn-hint {
      padding: 0.9rem 1.8rem;
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: bold;
      background: #7d5a4a;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(125,90,74,.3);
    }
    .btn-hint:hover { background: #8b6b5b; }
    .btn-hint:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-hint.revealed { background: #5c6b5c; }
    .hint-area {
      margin-top: 1rem;
    }
    .hint-area .or-divider {
      margin-top: 0;
    }
    .or-divider {
      font-size: 1rem;
      color: #7d5a4a;
      margin: 1rem 0 0.5rem 0;
    }

    /* 読み上げボタン */
    .read-aloud-btn {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      background: #5c3d2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .read-aloud-btn:hover { background: #7d5a4a; }

    /* 取り札グリッド */
    .torifuda-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .torifuda-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 4px solid #8b4513;
      border-radius: 16px;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: bold;
      color: #2c1810;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .torifuda-card:hover {
      background: #fef9e7;
      transform: scale(1.05);
    }
    .torifuda-card:active { transform: scale(0.98); }
    .torifuda-card.correct {
      background: #2d5a27;
      color: #fff;
      border-color: #1e3d1a;
      pointer-events: none;
    }
    .torifuda-card.wrong {
      background: #8b3a3a;
      color: #fff;
      border-color: #5c2525;
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* 結果・メッセージ */
    .message {
      text-align: center;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      margin-top: 1.5rem;
      min-height: 2.5rem;
      font-weight: bold;
    }
    .message.correct-msg { color: #2d5a27; }
    .message.wrong-msg { color: #8b3a3a; }
    .meaning-row {
      margin-top: 1rem;
      text-align: center;
    }
    .btn-meaning {
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      background: #4b5563;
      color: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }
    .btn-meaning:hover { background: #374151; }
    .meaning-text {
      margin-top: 0.5rem;
      font-size: 1rem;
      line-height: 1.6;
      color: #374151;
      text-align: left;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      background: rgba(255,255,255,0.7);
      padding: 0.75rem 1rem;
      border-radius: 10px;
    }

    /* 次へボタン */
    .next-btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      background: #5c3d2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .next-btn:hover { background: #7d5a4a; }
    .next-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ゲーム終了 */
    .result-screen {
      text-align: center;
      padding: 2rem 1rem;
    }

      font-size: clamp(1.5rem, 4vw, 2rem);
      color: #5c3d2e;
      margin-bottom: 1rem;
    }
    .result-screen .score {
      font-size: clamp(2rem, 6vw, 3rem);
      color: #8b4513;
      margin: 1rem 0;
    }
    .result-screen .again {
      margin-top: 2rem;
    }
  </style>
</head>

      '憂かりける 人を初瀬の 山おろしよ はげしかれとは 祈らぬものを': 'つれなく冷たかった人の心を変えたくて、初瀬観音にお参りしたけれど、山おろしの風のように心を激しくしてほしいとまでは祈らなかったのに、と、かえってつらくなった気持ちを言います。',
      '安倍の野の 露霜消えにし 我が身かな つれなき人の あと追ひにして': '安倍の野の露や霜が消えてしまうように、相手のあとを追い続けるうちに自分の身もやつれて消えてしまいそうだ、と、報われない恋のつらさを歌っています。',
      'あらざらむ この世のほかの 思ひ出に 今ひとたびの あふこともがな': 'もうじきこの世を去る身であるけれど、あの世へ行く前の思い出として、せめて今一度だけあなたに会いたいものだ、と切実な願いを述べています。',
      'めぐりあひて 見しやそれとも わかぬ間に 雲がくれにし 夜半の月かな': '久しぶりに会えたかと思うと、本当にその人だったのか確かめるひまもなく、夜半の月が雲に隠れてしまうように、すぐに姿が見えなくなってしまった、と心残りを言っています。',
      '有馬山 猪名の笹原 風吹けば いでそよ人を 忘れやはする': '有馬山や猪名の笹原に風が吹いて「そよそよ」と音を立てるように、私は決してあなたのことを忘れたりはしませんよ、と風の音に自分の気持ちを重ねています。',
      'やすらはで 寝なましものを さ夜更けて 傾くまでの 月を見しかな': 'さっさと寝てしまえばよかったのに、ためらって寝ないでいるうちに夜は更けてしまい、月が西に傾くまで起きて月を見てしまった、と、思い悩んだ夜を振り返っています。',
      '大江山 いく野の道の 遠ければ まだふみも見ず 天の橋立': '大江山から、生野を通って行く道はとても遠いので、私はまだ天の橋立への恋文（踏み＝文）も見ていないのです、と、地名と「文」をかけたことば遊びの歌です。',
      'いにしへに 恋ふる鳥は 霍公鳥 よのなかに鳴く 我がごとくは': 'むかしのことを恋い慕う鳥はホトトギスだというが、世の中でこんなに恋い慕って泣いている者は、私のほうだ、と自分のつらさをホトトギスになぞらえています。',
      '夜をこめて 鳥の空音は はかるとも よに逢坂の 関は許さじ': 'まだ夜のうちに鶏の鳴きまねをしてだましても、世に名高い逢坂の関は簡単には通してくれないように、あなたにだまして会おうとしても、そううまくはいきませんよ、と機知に富んだ歌です。',
      '今はただ 思ひ絶えなむ とばかりを 人づてならで いふよしもがな': 'もはやあなたへの思いはあきらめてしまおう、ということだけでも、誰かの口を借りずに、直接あなたに伝えるすべがあればよいのだが、ともどかしく感じています。',
      '朝ぼらけ 宇治の川霧 たえだえに あらはれわたる 瀬々の網代木': '夜がほのぼの明けるころ、宇治川の川霧が切れ切れになって、瀬に立てた網代木がところどころに姿をあらわしている情景を、静かに描いた歌です。',
      '恨みわび ほさぬ袖だに あるものを 恋に朽ちなむ 名こそ惜しけれ': '恨めしい気持ちで涙にぬれた袖が乾くひまもないほどなのに、そのうえ恋のせいで悪い名が立ってしまうのは残念でならない、と恋と世間の評判を気にしています。',
      'もろともに あはれと思へ 山桜 花よりほかに 知る人もなし': '山桜よ、私といっしょにこのさびしさを感じておくれ。私の気持ちをわかってくれるのは、お前以外には誰もいないのだから、と自然に話しかけるような歌です。',
      '春の夜の 夢ばかりなる 手枕に かひなく立たむ 名こそ惜しけれ': '春の夜のはかない夢のような一時の添い寝のために、悪い名だけがいつまでも残ってしまうのは惜しい、と、男女の関係の後の評判を気にしています。',
      '心にを わが思ふ人は ありといへど 見えぬがごとく なりにけるかな': '心の中で思っている人はたしかにいるけれど、今ではまるで見えない人のように、まったく会うこともできなくなってしまった、と遠い存在になった相手を嘆いています。',
      'あらし吹く 三室の山の もみぢ葉は 龍田の錦 神のまにまに': '嵐の吹く三室山の紅葉の葉は、竜田川の錦のように、神さまのお心のままに散ったり流れたりしているのだろう、と自然のままの美しさをたたえています。',
      '寂しさに 宿を立ち出でて ながむれば いづこも同じ 秋の夕暮': 'さびしさに耐えかねて家を出てあたりをながめてみても、どこも同じように物悲しい秋の夕暮れの景色ばかりだ、と深いさびしさを歌っています。',
      '夕されば 門田の稲葉 おとづれて あしのまろやに 秋風ぞ吹く': '夕方になると、家の前の田んぼの稲の葉がざわめき、その音があしぶきの粗末な家にまで届き、秋風が吹いてくるのがよくわかる、と静かな農村の秋を描いています。',
      '音に聞く 高師の浜の あだ波は かけじや袖の ぬれもこそすれ': 'うわさに聞く高師の浜の激しい波のように、あなたの浮気な心にはもう期待しないでおきましょう。関われば私の袖がまた涙でぬれてしまいそうだから、という意味です。',
      '高砂の 尾の上の桜 咲きにけり 外山の霞 立たずもあらなむ': '高砂山の峰の桜が咲いたのだから、手前の山にだけ霞がかかって見えない、などということがないように、どの山にもふさわしく春の景色が見えてほしい、と願っています。',
      'おほけなく うき世の民に おほふかな わが立つ杣に 墨染の袖': '身分の低い自分にはもったいないことだが、このつらい世の人々を救うために、私は僧となって墨染めの袖で人々を包もうとしているのだ、と出家の決意を語る歌です。',
      '花さそふ 嵐の庭の 雪ならで ふりゆくものは わが身なりけり': '庭の桜を誘って散らせる嵐は雪ではなく、降り積もっていくのは実は自分の老いゆく身なのだなあ、と、散る花に自分の老いを重ねています。',
      '来ぬ人を まつほの浦の 夕なぎに 焼くや藻塩の 身もこがれつつ': '来てくれない人を待ちながら、まつほの浦の静かな夕波の中で、藻塩を焼いているように、私の身も恋の炎でこがれているのだ、とつらい思いを表しています。',
      '風そよぐ ならの小川の 夕暮は みそぎぞ夏の しるしなりける': '風がさらさらと吹く奈良の小川の夕暮れは、夏も終わりに近づいたころで、みそぎの行事だけが夏であることを知らせているのだ、と季節のうつろいを感じています。',
      '人も愛し 人も恨めし あぢきなく 世を思ふゆゑに 物思ふ身は': '人をいとしく思うこともあれば、恨めしく思うこともあり、こんな世の中を考えるからこそ、私はあれこれ悩まずにはいられないのだ、と人間関係の難しさを歌います。',
      '御法の 三室の山も 紅葉せば 一むらのみ 錦なりけり': '仏の教えを伝える法会の行われる三室山も、紅葉の季節になれば、一面が錦織りのような美しい紅葉に包まれてしまうのだ、と仏と自然のありがたさを重ねています。',
      '夕日の さして山の端 いと近う なりたるほどに 紫だちたる': '夕日が山の端に近づき、あたりが紫がかった薄暗い色になっていく、その一瞬の美しさをしみじみとながめている歌です。',
      '朝に日に 匂ふ山吹の 花なれば 風のまにまに 身もこがれつつ': '朝日に照らされて黄金色にかがやく山吹の花のように、私は風のままに揺れながら、恋の思いに身をこがしているのだ、というたとえの歌です。',
      '捨てがたく 惜しきものから 世の中は かくぞあるべき としも経にけり': '捨てがたいもの、大事に思うものがたくさんあるけれど、世の中とはこういうものだとあきらめながら、いつのまにか年だけが過ぎてしまったなあ、と人生をふり返っています。',
      '滝の音は 絶えて久しく なりぬれど 名こそ流れて なほ聞こえけれ': '滝の水の音はもう聞こえなくなって久しいけれど、その滝の名声だけは今もなお世間に広く伝わっているのだ、と名と実の違いをおもしろく歌っています。',
      'なげけとて 月やはものを 思ふべき かこちがほなる わが涙かな': 'いくら自分が嘆いても、月がいっしょに悩んでくれるわけではないのに、あたかも月のせいで涙が出るかのように、自分の涙を月になすりつけている、という少し照れた歌です。',
      '村雨の 露もまだひぬ まきの葉に 霧立ちのぼる 秋の夕暮': 'にわか雨がやんだばかりで露もまだ乾いていない槙の葉から、白い霧が立ちのぼっている秋の夕暮れの景色を、静かに描いています。',
      '難波江の 芦のかりねの ひとよゆゑ みをつくしてや 恋ひわたるべき': '難波江の芦の仮の根のように、たった一夜だけの短い逢瀬のために、この先ずっと身をつくすほど恋し続けることになるのだろうか、と嘆いています。',
      '玉の緒よ 絶えなば絶えね ながらへば 忍ぶることの 弱りもぞする': 'いっそ命よ、絶えるなら絶えてしまえ。生きながらえていると、このつらい恋心をこらえきれなくなってしまいそうだから、と追いつめられた心を表しています。',
      '見せばやな 雄島のあまの 袖だにも ぬれにぞぬれし 色はかはらず': '雄島の漁師の袖でさえ波でびっしょりぬれても色は変わらないように、私の袖も涙でどんなにぬれても、あなたへの思いの色は変わっていませんよ、と言っています。',
      'きりぎりす 鳴くや霜夜の さむしろに 衣かたしき ひとりかも寝む': 'きりぎりすが鳴いている霜の降りる寒い夜に、むしろを敷いただけの床に衣を片側だけ敷いて、今夜もひとりで寝るのだろうか、とさびしい独り寝のようすを歌っています。',
      'わが袖は 潮干に見えぬ 沖の石の 人こそ知らね 乾くまもなし': '引き潮のときにも水の上に現れない沖の石のように、私の袖も人には見えないところで、涙にぬれて乾くひまもないのだ、と深い悲しみを表しています。',
      '世の中は 常にもがもな なぎさこぐ あまの小舟の 綱手かなしも': '世の中がいつまでも今のまま穏やかであってほしい。波打ちぎわを漁師の小舟が綱を引きながらこいでいく、そののどかな光景のように、と静かな幸せを願う歌です。',
      'み吉野の 山の秋風 さ夜更けて ふるさと寒く 衣うつなり': '吉野の山に秋風が吹き、夜も更けて、旧都の里では衣を打つ音がさむざむと聞こえてくるようだ、と遠くの秋のさびしさを思い浮かべています。',
      'おく山に 紅葉踏み分け 鳴く鹿の 声聞く時ぞ 秋は悲しき': '人里離れた奥山で紅葉を踏みわけて歩き、鹿の鳴き声を聞くときこそ、秋の悲しさがいちばん身にしみるのだ、と自然と心を重ねた歌です。'
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function normalizeForCompare(s) {
      return (s || '').replace(/\s/g, '').replace(/、|。/g, '');
    }

    function isMatchSaid(said, expected) {
      const a = normalizeForCompare(said);
      const b = normalizeForCompare(expected);
      if (a === b) return true;
      if (a.length >= 2 && b.length >= 2 && (a.includes(b) || b.includes(a))) return true;
      if (b.length >= 3 && a.length >= 2) {
        const mid = Math.floor(b.length / 2);
        if (a.includes(b.slice(0, mid)) || a.includes(b.slice(-mid))) return true;
      }
      return false;
    }

    function startGame() {
      deck = shuffle(KARUTA_DATA).slice(0, 10);
      currentIndex = 0;
      score = 0;
      startScreen.style.display = 'none';
      resultScreen.style.display = 'none';
      gameScreen.style.display = 'block';
      initSpeech();
      showQuestion();
    }

    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.style.display = 'none';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onresult = function(e) {
        const t = (e.results[0] && e.results[0][0]) ? e.results[0][0].transcript : '';
        micStatus.textContent = '「' + t + '」';
        checkSpokenAnswer(t);
      };
      recognition.onend = function() {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
      };
      recognition.onerror = function() {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
        micStatus.textContent = '聞き取れませんでした。もう一度か、下から選んでね。';
      };
    }

    function getShimoChoices(correctShimo) {
      const others = KARUTA_DATA.map(d => d.shimo).filter(s => s !== correctShimo);
      const shuffled = shuffle(others);
      const choices = [correctShimo, ...shuffled.slice(0, 3)].slice(0, 4);
      return shuffle(choices);
    }

    function showQuestion() {
      answered = false;
      messageEl.textContent = '';
      messageEl.className = 'message';
      nextBtn.style.display = 'none';
      micStatus.textContent = '';
      hintArea.style.display = 'none';
      hintBtn.disabled = false;
      hintBtn.textContent = '💡 ヒント（候補を見る）';
      hintBtn.classList.remove('revealed');
      meaningText.style.display = 'none';
      meaningText.textContent = '';

      const card = deck[currentIndex];
      yomifudaText.textContent = card.kami;

      const choices = getShimoChoices(card.shimo);
      torifudaGrid.innerHTML = '';
      choices.forEach(shimo => {
        const div = document.createElement('div');
        div.className = 'torifuda-card';
        div.textContent = shimo;
        div.dataset.shimo = shimo;
        div.addEventListener('click', () => onSelectCard(div, shimo));
        torifudaGrid.appendChild(div);
      });

      if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
        readAloudBtn.style.display = 'inline-block';
      } else {
        readAloudBtn.style.display = 'none';
      }
    }

    function showMeaning() {
      const card = deck[currentIndex];
      const key = card.kami + ' ' + card.shimo;
      const text = MEANING_MAP[key] || 'この札は百人一首などの歌です。くわしい意味の説明は、これからゆっくり一緒に見ていきましょう。';
      meaningText.textContent = text;
      meaningText.style.display = 'block';
    }

    function showHint() {
      hintArea.style.display = 'block';
      hintBtn.disabled = true;
      hintBtn.textContent = '候補を表示しました';
      hintBtn.classList.add('revealed');
    }

    function checkSpokenAnswer(said) {
      if (answered) return;
      const card = deck[currentIndex];
      const ok = isMatchSaid(said, card.shimo);
      setAnswerResult(ok, card.shimo);
    }

    function setAnswerResult(ok, correctShimo) {
      answered = true;
      const cards = torifudaGrid.querySelectorAll('.torifuda-card');
      cards.forEach(c => {
        c.style.pointerEvents = 'none';
        if (c.dataset.shimo === correctShimo) c.classList.add('correct');
        else c.classList.remove('wrong');
      });

      if (ok) {
        score++;
        messageEl.textContent = '〇 正解！ よく言えたね！';
        messageEl.className = 'message correct-msg';
      } else {
        messageEl.textContent = '× 正解は「' + correctShimo + '」でした。またつぎで言ってみてね。';
        messageEl.className = 'message wrong-msg';
      }
      nextBtn.style.display = 'block';
    }

    function onSelectCard(el, selected) {
      if (answered) return;
      answered = true;

      const correct = deck[currentIndex].shimo;
      const cards = torifudaGrid.querySelectorAll('.torifuda-card');
      cards.forEach(c => {
        c.style.pointerEvents = 'none';
        if (c.dataset.shimo === correct) c.classList.add('correct');
        else if (c === el) c.classList.add('wrong');
      });

      if (selected === correct) {
        score++;
        messageEl.textContent = '〇 正解！';
        messageEl.className = 'message correct-msg';
      } else {
        messageEl.textContent = '× 正解は「' + correct + '」でした';
        messageEl.className = 'message wrong-msg';
      }
      nextBtn.style.display = 'block';
    }

    function startListening() {
      if (!recognition || answered) return;
      micBtn.classList.add('listening');
      micBtn.disabled = true;
      micBtn.textContent = '🎤 きいてます…';
      micStatus.textContent = 'つづきを言ってね';
      try {
        recognition.start();
      } catch (e) {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
      }
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= deck.length) {
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        document.getElementById('final-score').textContent =
          score + ' / ' + deck.length + ' 問 正解！';
        return;
      }
      showQuestion();
    }

    function readAloud() {
      const text = deck[currentIndex].kami;
      if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('next-btn').addEventListener('click', nextQuestion);
    document.getElementById('again-btn').addEventListener('click', startGame);
    readAloudBtn.addEventListener('click', readAloud);
    micBtn.addEventListener('click', startListening);
    hintBtn.addEventListener('click', showHint);
    meaningBtn.addEventListener('click', showMeaning);
  </script>
</body>
