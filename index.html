<html lang="ja">
<head>

  <title>れんげの家 カルタ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(135deg, #fef9e7 0%, #f5e6c8 100%);
      color: #2c1810;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #5c3d2e;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      text-align: center;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      color: #7d5a4a;
      margin-bottom: 1.5rem;
    }

    /* スタート画面 */
    .start-screen {
      text-align: center;
      padding: 2rem 1rem;
    }
    .start-screen p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      margin-bottom: 2rem;
      line-height: 1.7;
    }
    .btn-big {
      display: inline-block;
      padding: 1rem 3rem;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: bold;
      background: #8b4513;
      color: #fff;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(139,69,19,.35);
    }
    .btn-big:hover, .btn-big:focus {
      background: #a0522d;
      transform: scale(1.02);
    }
    .btn-big:active { transform: scale(0.98); }

    /* 読み札エリア */
    .yomifuda-area {
      background: #fff;
      border: 4px solid #8b4513;
      border-radius: 20px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .yomifuda-label {
      font-size: 1rem;
      color: #7d5a4a;
      margin: 0 0 0.5rem 0;
    }
    .yomifuda-text {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: bold;
      line-height: 1.6;
      color: #2c1810;
    }

    .prompt-text {
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      color: #5c3d2e;
      margin: 1rem 0 0.5rem 0;
      font-weight: bold;
    }
    .voice-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 1rem 0;
    }
    .btn-mic {
      padding: 1rem 2rem;
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      font-weight: bold;
      background: #2d5a27;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(45,90,39,.3);
    }
    .btn-mic:hover { background: #3d6b35; }
    .btn-mic:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-mic.listening { background: #8b3a3a; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.85; } }
    .mic-status {
      font-size: 1rem;
      color: #5c3d2e;
    }
    .hint-row {
      margin: 1.25rem 0 0.5rem 0;
    }
    .btn-hint {
      padding: 0.9rem 1.8rem;
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: bold;
      background: #7d5a4a;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(125,90,74,.3);
    }
    .btn-hint:hover { background: #8b6b5b; }
    .btn-hint:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-hint.revealed { background: #5c6b5c; }
    .hint-area {
      margin-top: 1rem;
    }
    .hint-area .or-divider {
      margin-top: 0;
    }
    .or-divider {
      font-size: 1rem;
      color: #7d5a4a;
      margin: 1rem 0 0.5rem 0;
    }

    /* 読み上げボタン */
    .read-aloud-btn {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      background: #5c3d2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .read-aloud-btn:hover { background: #7d5a4a; }

    /* 取り札グリッド */
    .torifuda-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .torifuda-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 4px solid #8b4513;
      border-radius: 16px;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: bold;
      color: #2c1810;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .torifuda-card:hover {
      background: #fef9e7;
      transform: scale(1.05);
    }
    .torifuda-card:active { transform: scale(0.98); }
    .torifuda-card.correct {
      background: #2d5a27;
      color: #fff;
      border-color: #1e3d1a;
      pointer-events: none;
    }
    .torifuda-card.wrong {
      background: #8b3a3a;
      color: #fff;
      border-color: #5c2525;
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* 結果・メッセージ */
    .message {
      text-align: center;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      margin-top: 1.5rem;
      min-height: 2.5rem;
      font-weight: bold;
    }
    .message.correct-msg { color: #2d5a27; }
    .message.wrong-msg { color: #8b3a3a; }

    /* 次へボタン */
    .next-btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      background: #5c3d2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .next-btn:hover { background: #7d5a4a; }
    .next-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ゲーム終了 */
    .result-screen {
      text-align: center;
      padding: 2rem 1rem;
    }
    .result-screen h2 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: #5c3d2e;
      margin-bottom: 1rem;
    }
    .result-screen .score {
      font-size: clamp(2rem, 6vw, 3rem);
      color: #8b4513;
      margin: 1rem 0;
    }
    .result-screen .again {
      margin-top: 2rem;
    }
  </style>
</head>

      { kami: '滝の音は 絶えて久しく なりぬれど', shimo: '名こそ流れて なほ聞こえけれ' },
      { kami: 'なげけとて 月やはものを 思ふべき', shimo: 'かこちがほなる わが涙かな' },
      { kami: '村雨の 露もまだひぬ まきの葉に', shimo: '霧立ちのぼる 秋の夕暮' },
      { kami: '難波江の 芦のかりねの ひとよゆゑ', shimo: 'みをつくしてや 恋ひわたるべき' },
      { kami: '玉の緒よ 絶えなば絶えね ながらへば', shimo: '忍ぶることの 弱りもぞする' },
      { kami: '見せばやな 雄島のあまの 袖だにも', shimo: 'ぬれにぞぬれし 色はかはらず' },
      { kami: 'きりぎりす 鳴くや霜夜の さむしろに', shimo: '衣かたしき ひとりかも寝む' },
      { kami: 'わが袖は 潮干に見えぬ 沖の石の', shimo: '人こそ知らね 乾くまもなし' },
      { kami: '世の中は 常にもがもな なぎさこぐ', shimo: 'あまの小舟の 綱手かなしも' },
      { kami: 'み吉野の 山の秋風 さ夜更けて', shimo: 'ふるさと寒く 衣うつなり' },
      { kami: 'おく山に 紅葉踏み分け 鳴く鹿の', shimo: '声聞く時ぞ 秋は悲しき' },
    ];

    let deck = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let recognition = null;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const resultScreen = document.getElementById('result-screen');
    const yomifudaText = document.getElementById('yomifuda-text');
    const torifudaGrid = document.getElementById('torifuda-grid');
    const messageEl = document.getElementById('message');
    const nextBtn = document.getElementById('next-btn');
    const readAloudBtn = document.getElementById('read-aloud-btn');
    const micBtn = document.getElementById('mic-btn');
    const micStatus = document.getElementById('mic-status');
    const hintBtn = document.getElementById('hint-btn');
    const hintArea = document.getElementById('hint-area');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function normalizeForCompare(s) {
      return (s || '').replace(/\s/g, '').replace(/、|。/g, '');
    }

    function isMatchSaid(said, expected) {
      const a = normalizeForCompare(said);
      const b = normalizeForCompare(expected);
      if (a === b) return true;
      if (a.length >= 2 && b.length >= 2 && (a.includes(b) || b.includes(a))) return true;
      if (b.length >= 3 && a.length >= 2) {
        const mid = Math.floor(b.length / 2);
        if (a.includes(b.slice(0, mid)) || a.includes(b.slice(-mid))) return true;
      }
      return false;
    }

    function startGame() {
      deck = shuffle(KARUTA_DATA).slice(0, 10);
      currentIndex = 0;
      score = 0;
      startScreen.style.display = 'none';
      resultScreen.style.display = 'none';
      gameScreen.style.display = 'block';
      initSpeech();
      showQuestion();
    }

    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.style.display = 'none';
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onresult = function(e) {
        const t = (e.results[0] && e.results[0][0]) ? e.results[0][0].transcript : '';
        micStatus.textContent = '「' + t + '」';
        checkSpokenAnswer(t);
      };
      recognition.onend = function() {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
      };
      recognition.onerror = function() {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
        micStatus.textContent = '聞き取れませんでした。もう一度か、下から選んでね。';
      };
    }

    function getShimoChoices(correctShimo) {
      const others = KARUTA_DATA.map(d => d.shimo).filter(s => s !== correctShimo);
      const shuffled = shuffle(others);
      const choices = [correctShimo, ...shuffled.slice(0, 3)].slice(0, 4);
      return shuffle(choices);
    }

    function showQuestion() {
      answered = false;
      messageEl.textContent = '';
      messageEl.className = 'message';
      nextBtn.style.display = 'none';
      micStatus.textContent = '';
      hintArea.style.display = 'none';
      hintBtn.disabled = false;
      hintBtn.textContent = '💡 ヒント（候補を見る）';
      hintBtn.classList.remove('revealed');

      const card = deck[currentIndex];
      yomifudaText.textContent = card.kami;

      const choices = getShimoChoices(card.shimo);
      torifudaGrid.innerHTML = '';
      choices.forEach(shimo => {
        const div = document.createElement('div');
        div.className = 'torifuda-card';
        div.textContent = shimo;
        div.dataset.shimo = shimo;
        div.addEventListener('click', () => onSelectCard(div, shimo));
        torifudaGrid.appendChild(div);
      });

      if (window.speechSynthesis && window.SpeechSynthesisUtterance) {
        readAloudBtn.style.display = 'inline-block';
      } else {
        readAloudBtn.style.display = 'none';
      }
    }

    function showHint() {
      hintArea.style.display = 'block';
      hintBtn.disabled = true;
      hintBtn.textContent = '候補を表示しました';
      hintBtn.classList.add('revealed');
    }

    function checkSpokenAnswer(said) {
      if (answered) return;
      const card = deck[currentIndex];
      const ok = isMatchSaid(said, card.shimo);
      setAnswerResult(ok, card.shimo);
    }

    function setAnswerResult(ok, correctShimo) {
      answered = true;
      const cards = torifudaGrid.querySelectorAll('.torifuda-card');
      cards.forEach(c => {
        c.style.pointerEvents = 'none';
        if (c.dataset.shimo === correctShimo) c.classList.add('correct');
        else c.classList.remove('wrong');
      });

      if (ok) {
        score++;
        messageEl.textContent = '〇 正解！ よく言えたね！';
        messageEl.className = 'message correct-msg';
      } else {
        messageEl.textContent = '× 正解は「' + correctShimo + '」でした。またつぎで言ってみてね。';
        messageEl.className = 'message wrong-msg';
      }
      nextBtn.style.display = 'block';
    }

    function onSelectCard(el, selected) {
      if (answered) return;
      answered = true;

      const correct = deck[currentIndex].shimo;
      const cards = torifudaGrid.querySelectorAll('.torifuda-card');
      cards.forEach(c => {
        c.style.pointerEvents = 'none';
        if (c.dataset.shimo === correct) c.classList.add('correct');
        else if (c === el) c.classList.add('wrong');
      });

      if (selected === correct) {
        score++;
        messageEl.textContent = '〇 正解！';
        messageEl.className = 'message correct-msg';
      } else {
        messageEl.textContent = '× 正解は「' + correct + '」でした';
        messageEl.className = 'message wrong-msg';
      }
      nextBtn.style.display = 'block';
    }

    function startListening() {
      if (!recognition || answered) return;
      micBtn.classList.add('listening');
      micBtn.disabled = true;
      micBtn.textContent = '🎤 きいてます…';
      micStatus.textContent = 'つづきを言ってね';
      try {
        recognition.start();
      } catch (e) {
        micBtn.classList.remove('listening');
        micBtn.disabled = false;
        micBtn.textContent = '🎤 マイクで答える';
      }
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= deck.length) {
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        document.getElementById('final-score').textContent =
          score + ' / ' + deck.length + ' 問 正解！';
        return;
      }
      showQuestion();
    }

    function readAloud() {
      const text = deck[currentIndex].kami;
      if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('next-btn').addEventListener('click', nextQuestion);
    document.getElementById('again-btn').addEventListener('click', startGame);
    readAloudBtn.addEventListener('click', readAloud);
    micBtn.addEventListener('click', startListening);
    hintBtn.addEventListener('click', showHint);
  </script>
</body>
</html>
